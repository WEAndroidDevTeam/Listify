name: Listify CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint 2>&1
        continue-on-error: true
        id: lint

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results*.html
            app/build/reports/lint-results*.xml
          retention-days: 3

      - name: Show Lint Errors
        if: always()
        run: |
          echo "=== LINT XML REPORT ==="
          find app/build/reports -name "*.xml" -exec grep -l "severity=\"Error\"" {} \; 2>/dev/null | while read f; do
            echo "--- $f ---"
            grep -A3 'severity="Error"' "$f" | head -60
          done || echo "No XML report found"
          
          echo "=== LINT OUTCOME ==="
          if [ "${{ steps.lint.outcome }}" = "failure" ]; then
            echo "LINT FAILED — see report above"
            exit 1
          fi

      - name: Run Unit Tests with Coverage
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listify-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

      - name: Comment PR — CI passed
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ CI Passed — \`${sha}\`\n\n| Check | Result |\n|---|---|\n| Lint | ✅ Clean |\n| Unit Tests | ✅ All green |\n| Debug APK | ✅ Built |\n\n[View full run](${runUrl})\n\n---\n**Ready for review.** This PR requires **1 approval** before it can be merged.`
            });

      - name: Comment PR — CI failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ CI Failed — \`${sha}\`\n\nOne or more checks failed. [View logs](${runUrl}) to diagnose.\n\n> This PR cannot be merged until CI is green.`
            });
